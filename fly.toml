# fly.toml — Ensemble backend platform manifesti (#181)
#
# İmajı (#61 Dockerfile) Fly.io'da NASIL koşacağını tanımlar: port, health-check,
# tek-instance, secret referansları. Kaynak sözleşme: docs/sprint3-kontratlar.md
# Ek A (deploy-env eşleme tablosu — hangi anahtar Fly secret / Vercel env / CI
# secret / yalnız-local).
#
# NOT — release_command / migration: alembic-on-deploy BİLİNÇLİ OLARAK burada
# YOK. #179 (psycopg sürücüsü) henüz landing olmadı (bkz. docker-compose.yml
# yorumu) — hosted mod DATABASE_URL'e henüz gerçekten bağlanamıyor. Otomatik
# release_command = "alembic upgrade head" bu yüzden #187'de eklenecek
# (release-migrate dilimi). O güne kadar migration elle `make migrate` ile
# (ya da `fly ssh console` + `cd src/backend && alembic upgrade head`) koşulur.

app = "ensemble-backend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  # Yalnız SIR-OLMAYAN değerler. Secret referansları (DATABASE_URL,
  # GEMINI_API_KEY, GITHUB_APP_*, GITHUB_WEBHOOK_SECRET, CORS_ORIGINS) buraya
  # YAZILMAZ — Ek A gereği `fly secrets set` ile ayrı set edilir (aşağıdaki
  # PR gövdesi şablonuna bak).
  ENSEMBLE_MODE = "hosted"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
