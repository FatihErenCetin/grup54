name: 🔧 Task
description: Teknik bir task (genelde bir story'ye bağlı)
title: "[Task] "
labels: ["task"]
body:
  - type: input
    id: parent
    attributes:
      label: Bağlı story
      placeholder: "#6 (varsa)"
  - type: textarea
    id: desc
    attributes:
      label: Açıklama
      description: Ne yapılacak?
    validations:
      required: true
  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - Backlog
        - Sprint 1
        - Sprint 2
        - Sprint 3
