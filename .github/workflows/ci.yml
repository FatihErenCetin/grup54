name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install   # sürüm .python-version'dan

      - name: Install dependencies
        run: uv sync --all-packages --locked

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      # Kontrat drift-check (#20): router'lar degisip openapi.json commit'lenmediyse kirmizi
      - name: OpenAPI drift-check
        run: |
          make openapi
          git diff --exit-code src/shared/openapi.json

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sir taramasi (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Test (vitest)
        run: npm test

      # Uretilen TS tipleri spec'le senkron mu (#20): degilse kirmizi.
      # DIKKAT: job working-directory=src/frontend → pathspec cwd'ye GORELI
      # yazilmali; repo-koku yolu hicbir dosyayla eslesmez ve check no-op olur
      # (adversarial dogrulama bulgusu — kas testiyle kanitlandi)
      - name: Client tip drift-check
        run: |
          npm run gen:api
          git diff --exit-code -- src/api/schema.d.ts
