name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install   # sürüm .python-version'dan

      - name: Install dependencies
        run: uv sync --all-packages --locked

      - name: Lint
        run: make lint

      - name: Test
        run: make test
