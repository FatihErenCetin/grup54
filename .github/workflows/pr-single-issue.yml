# PR tek-issue kurali (#215) — CONTRIBUTING §2 "Bir branch = bir issue"'yu
# makine-zorlar: PR govdesinde GitHub'in GERCEKTEN auto-close ettigi bicimde
# (Closes/Fixes/Resolves #N, keyword her referanstan HEMEN once) >1 FARKLI
# issue varsa is FAIL olur. Amac: PR #208 gibi cok-issue bundle'lari review'a
# kalmadan ilk savunmada yakalamak. Kapsam SINIRI: govde-metnini okur, semantik
# bundling'i (tek Closes ile 9 is) goremez — o hala review'un isi.
# Mevcut desen: pr-triage.yml (actions/github-script@v7).

name: PR tek-issue kontrolu

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  check-single-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Kacis kapisi: mesru coklu-issue PR'lari icin label ile atla.
            const labels = (context.payload.pull_request.labels || []).map(
              (l) => l.name
            );
            if (labels.includes("multi-issue-ok")) {
              core.info(
                "`multi-issue-ok` etiketi bulundu — tek-issue kontrolu atlandi."
              );
              return;
            }

            const body = context.payload.pull_request.body || "";

            // GitHub'in auto-close semantigi: kapatma keyword'u (buyuk/kucuk
            // harf duyarsiz) HEMEN ardindan bosluk + #<sayi> gelmeli. Keyword
            // olmadan yalniz "#2" gecen referanslar (orn. "Closes #1, #2")
            // GitHub'da da issue KAPATMAZ — bu yuzden regex'e girmez.
            const closeRegex =
              /\b(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;

            const issueNumbers = new Set();
            let match;
            while ((match = closeRegex.exec(body)) !== null) {
              issueNumbers.add(match[2]);
            }

            if (issueNumbers.size > 1) {
              const list = [...issueNumbers]
                .map((n) => `#${n}`)
                .join(", ");
              core.setFailed(
                `PR su issue'lari kapatiyor: ${list}. ` +
                  "Kural: bir branch = bir issue (CONTRIBUTING §2). " +
                  "Her issue'yu ayri PR'a bol; mesru istisna ise " +
                  "`multi-issue-ok` label'i ekle."
              );
              return;
            }

            core.info(
              `OK — ${issueNumbers.size} issue kapatiliyor (kural: bir ` +
                "branch = bir issue)."
            );
