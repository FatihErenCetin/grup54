# .harness/ front-matter → JSON-schema doğrulaması (#55).
# Front-matter parse sözleşmesi sessizce kaymasın: her PR'da .harness/ altındaki
# YAML front-matter'lar src/shared/ensemble_shared/schemas/*.json'a göre
# doğrulanır (scripts/harness_validate.py — production ile AYNI parse yolu).
# .harness/ henüz yoksa (onboarding öncesi) adım no-op geçer.
name: Harness validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install   # sürüm .python-version'dan

      - name: Install dependencies
        run: uv sync --all-packages --locked

      - name: Harness front-matter doğrulaması
        run: uv run python scripts/harness_validate.py
